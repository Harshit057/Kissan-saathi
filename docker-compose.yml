version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database with PostGIS
  # ============================================================================
  postgres:
    image: postgis/postgis:15-3.3
    container_name: kisaan_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kisaan_saathi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kisaan_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis Cache & Job Queue
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: kisaan_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kisaan_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Qdrant Vector Database (for RAG)
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kisaan_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - kisaan_network
    environment:
      QDRANT_API_KEY: your-qdrant-api-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # FastAPI Backend
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kisaan_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/kisaan_saathi"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - kisaan_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================================================
  # Next.js Frontend
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kisaan_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/.next
    networks:
      - kisaan_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  kisaan_network:
    driver: bridge
